<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CSS Profile Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style type="text/tailwindcss">
    @layer components {
            @keyframes shine {
                0% { transform: rotate(30deg) translate(-30%, -30%); }
                100% { transform: rotate(30deg) translate(30%, 30%); }
              }
            .card {
                clip-path: polygon(
                    40px 0%, 
                    100% 0, 
                    100% calc(100% - 40px), 
                    calc(100% - 40px) 100%, 
                    0 100%, 
                    0% 40px
                );
            }
            
            .card::before {
                clip-path: polygon(
                    45px 0%, 
                    100% 0, 
                    100% calc(100% - 45px), 
                    calc(100% - 45px) 100%, 
                    0 100%, 
                    0% 45px
                );
                content: '';
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(
                  to bottom right, 
                  transparent 45%, 
                  #00f5ff33 50%, 
                  transparent 55%
                );
                transform: rotate(30deg);
                animation: shine 6s infinite;  
                z-index: -1;

              }
              .card:hover ~ .card::before{
                  animation: shine 6s infinite;
              }
              .profile-img::after {
                  content: '';
                  animation: rotate 4s linear infinite;
              }
              .status {
                  animation: pulse 2s infinite;
              }
              @keyframes rotate {
                  0% { transform: rotate(0deg); }
                  100% { transform: rotate(360deg); }
              }
              @keyframes pulse {
                  0% { box-shadow: 0 0 0 0 rgba(31, 224, 31, 0.8); }
                  70% { box-shadow: 0 0 0 10px rgba(31, 224, 31, 0); }
                  100% { box-shadow: 0 0 0 0 rgba(31, 224, 31, 0); }
              }
              @keyframes gradient {
                  0% { background-position: 0% 50%; }
                  50% { background-position: 100% 50%; }
                  100% { background-position: 0% 50%; }
              }
      }
    </style>
</head>

<body class="bg-gray-900 flex justify-center items-center min-h-screen font-['Poppins']">
  <div
    class="card w-80 h-[28rem] bg-gray-800 relative flex flex-col items-center p-7 m-8 overflow-hidden shadow-xl shadow-black/50 transition-all duration-600 ease-[cubic-bezier(0.23,1,0.32,1)] hover:-translate-y-4 hover:scale-103 hover:shadow-lg hover:shadow-rose-600/40">
    <!-- Gradient Border -->
    <div
      class="card before:content-[''] before:absolute before:-top-1 before:-left-1 before:-right-1 before:-bottom-1 before:z-[-1] before:bg-gradient-to-r before:from-rose-600 before:via-amber-500 before:to-pink-600 before:bg-[length:400%_400%] before:animate-gradient">
    </div>
  </div>
</body>

</html>
